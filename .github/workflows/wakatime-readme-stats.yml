name: Waka Readme Stats

on:
  schedule:
    # Runs at 00:00 AM (UTC+8)
    - cron: '0 0 16 * * *'
  workflow_dispatch:
jobs:
  update-readme-stats:
    name: Update this repo's readme
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LOCALE: 'zh'
